<section class="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <span class="brand-mark" aria-hidden="true">P</span>
      <div>
        <h1>Printeoo</h1>
        <p>Software print shop modern untuk Indonesia</p>
      </div>
    </div>

    <form class="login-form" data-action="login">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input id="login-email" name="email" type="email" placeholder="owner@printeoo.id" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password" placeholder="Masukkan password" autocomplete="current-password">
      </div>

      <button class="btn-primary w-full" type="submit">Masuk</button>
    </form>

    <div class="login-divider">
      <span>Shortcut demo</span>
    </div>

    <div class="login-shortcuts">
      <button class="btn-secondary" type="button" data-action="login-role" data-role="owner">Masuk sebagai Owner</button>
      <button class="btn-secondary" type="button" data-action="login-role" data-role="cashier">Kasir</button>
      <button class="btn-secondary" type="button" data-action="login-role" data-role="operator">Operator</button>
      <button class="btn-secondary" type="button" data-action="login-role" data-role="display">Display Mode</button>
    </div>
  </div>
</section>
