<section class="inventory-page" data-page="inventory">
  <div class="page-header">
    <div>
      <h1 class="page-title">Inventaris & Gudang</h1>
      <p class="page-subtitle">Kelola stok bahan baku dan catat penerimaan dari supplier.</p>
    </div>
    <div class="flex gap-3 flex-wrap">
      <button class="btn-primary" type="button" data-action="open-incoming-modal">+ Catat Penerimaan</button>
      <button class="btn-secondary" type="button" data-action="open-opname-view">Stok Opname</button>
      <button class="btn-secondary" type="button" data-action="open-usage-report">Laporan Penggunaan</button>
    </div>
  </div>

  <div id="inventory-alert"></div>

  <div class="tabs mb-4">
    <button class="tab-button active" type="button" data-inv-tab="stok">Stok Bahan</button>
    <button class="tab-button" type="button" data-inv-tab="incoming">Riwayat Penerimaan</button>
    <button class="tab-button" type="button" data-inv-tab="opname">Stok Opname</button>
    <button class="tab-button" type="button" data-inv-tab="po">Purchase Order</button>
    <button class="tab-button" type="button" data-inv-tab="usage">Laporan Penggunaan</button>
    <button class="tab-button" type="button" data-inv-tab="waste">Laporan Waste</button>
  </div>

  <div id="inventory-tab-content"></div>
  <div id="inventory-modal-root"></div>
</section>
